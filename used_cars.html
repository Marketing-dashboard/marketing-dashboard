<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Used Cars — City & Campaign Performance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#F0F2F5; --surface:#fff; --surface2:#F7F8FA;
  --border:#E4E7EC; --border2:#D0D5DD;
  --text:#101828; --text2:#475467; --text3:#98A2B3;
  --navy:#1D2939; --navy2:#344054;
  --ahm:#7C3AED; --ahm-light:#F5F3FF; --ahm-border:#C4B5FD;
  --chd:#0369A1; --chd-light:#EFF6FF; --chd-border:#BAE6FD;
  --nas:#047857; --nas-light:#ECFDF5; --nas-border:#6EE7B7;
  --google:#EA4335; --google-light:#FEF2F2; --google-border:#FCA5A5;
  --meta:#1877F2; --meta-light:#EFF6FF; --meta-border:#93C5FD;
  --cat:#D97706; --cat-light:#FFFBEB;
  --lead:#0891B2; --lead-light:#ECFEFF;
  --search:#7C3AED; --search-light:#F5F3FF;
  --demand:#059669; --demand-light:#ECFDF5;
  --r:10px; --rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.page{max-width:1180px;margin:0 auto;padding:28px 20px 60px}

/* ── Auth Gate ── */
.auth-gate{position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:2000}
.auth-card{background:#fff;border-radius:16px;padding:44px 40px;max-width:400px;width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
.auth-logo{width:56px;height:56px;background:var(--navy);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px}
.auth-card h2{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:8px}
.auth-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.auth-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
.auth-btn:hover{background:#2d3f55}
.auth-btn:disabled{opacity:0.55;cursor:default}
.auth-btn svg{flex-shrink:0}
.auth-error{color:#c0392b;font-size:12px;margin-top:14px;line-height:1.5}
.auth-info-box{background:#F0F2F5;border-radius:8px;padding:12px 16px;margin-top:16px;font-size:12px;color:var(--text2);line-height:1.6;text-align:left}
.auth-info-box strong{color:var(--text)}
.auth-signout-top{position:fixed;top:14px;right:18px;font-size:12px;color:var(--text2);background:#fff;border:1px solid var(--border);border-radius:20px;padding:6px 16px;cursor:pointer;z-index:1999;display:none;font-family:inherit}
.auth-signout-top:hover{background:var(--bg)}

/* ── Admin request panel ── */
.req-panel{position:fixed;bottom:20px;right:20px;width:390px;background:#fff;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,0.18);z-index:1900;display:none;overflow:hidden}
.req-panel-hdr{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.req-panel-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.req-badge{background:#E8650A;color:#fff;border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700}
.req-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.req-tab{flex:1;padding:8px;font-size:12px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:color .15s}
.req-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.req-body{max-height:320px;overflow-y:auto}
.req-item{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.req-item:last-child{border-bottom:none}
.req-avatar{width:34px;height:34px;border-radius:50%;background:var(--bg);flex-shrink:0;object-fit:cover}
.req-info{flex:1;min-width:0}
.req-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-email{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.req-time{font-size:10px;color:var(--text3)}
.req-actions{display:flex;gap:5px;flex-shrink:0}
.btn-approve{background:#047857;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-approve:hover{background:#035c43}
.btn-reject{background:#fdecea;color:#c0392b;border:1px solid #f5c6c6;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-reject:hover{background:#f5c6c6}
.btn-revoke{background:#fff3eb;color:#b45309;border:1px solid #fbbf24;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-revoke:hover{background:#fde68a}
.req-empty{padding:22px;text-align:center;color:var(--text3);font-size:13px}

/* ── Header ── */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.logo{width:44px;height:44px;background:var(--navy);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:24px;height:24px;fill:#fff}
.title-block h1{font-size:20px;font-weight:700;color:var(--navy)}
.title-block p{font-size:12px;color:var(--text2);margin-top:2px}
.period-badge{margin-left:auto;background:var(--navy);color:#fff;font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;white-space:nowrap;letter-spacing:.04em}

/* ── Date filter bar ── */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.date-input{font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.date-input:focus{outline:2px solid var(--navy);outline-offset:1px}
.filter-sep{color:var(--text3);font-size:13px}
.filter-reset{margin-left:auto;font-size:12px;color:var(--text2);background:none;border:1px solid var(--border2);border-radius:7px;padding:5px 12px;cursor:pointer;font-family:inherit}
.filter-reset:hover{background:var(--bg)}
.filter-active-badge{font-size:11px;font-weight:600;color:#0369A1;background:#EFF6FF;border:1px solid #BAE6FD;border-radius:20px;padding:3px 10px;white-space:nowrap}
.no-data-msg{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.no-data-msg strong{display:block;font-size:16px;color:var(--text2);margin-bottom:6px}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:26px}
.tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:inherit;margin-bottom:-2px;transition:color .15s;white-space:nowrap}
.tab.active{color:var(--navy);font-weight:700;border-bottom-color:var(--navy)}
.tab:hover:not(.active){color:var(--text)}

/* ── Summary strip ── */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sum-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sum-val{font-size:22px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.sum-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── City cards ── */
.city-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:860px){.city-grid{grid-template-columns:1fr}}
.city-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.city-hdr{padding:14px 18px;display:flex;align-items:center;gap:10px}
.city-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.city-hdr-name{font-size:15px;font-weight:700}
.city-hdr-total{margin-left:auto;font-size:12px;font-family:'DM Mono',monospace;font-weight:600}
.city-body{padding:14px 18px 18px}
.kpi-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.kpi-pill{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600}
.plat-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.plat-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.divider{height:1px;background:var(--border);margin:10px 0}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.metric{background:var(--surface2);border-radius:7px;padding:9px 11px;border:1px solid var(--border)}
.metric-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.metric-val{font-size:16px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.metric-sub{font-size:10px;color:var(--text2);margin-top:1px}

/* ── Table ── */
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.tbl-toolbar{padding:13px 18px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tbl-title{font-size:14px;font-weight:700;color:var(--navy)}
.tbl-sub{font-size:11px;color:var(--text2)}
.filters{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.fsel{font-size:12px;padding:5px 9px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0}
thead tr{background:var(--surface2)}
th{padding:9px 12px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;text-align:right;white-space:nowrap;border-bottom:2px solid var(--border2);background:var(--surface2)}
th.left{text-align:left}
th.center{text-align:center}
th.sticky{position:sticky;z-index:3;background:var(--surface2);box-shadow:2px 0 4px rgba(0,0,0,.06)}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid #F2F4F7;text-align:right;white-space:nowrap;font-family:'DM Mono',monospace;color:var(--text);background:inherit}
td.left{text-align:left;font-family:'Inter',system-ui;font-size:12px}
td.center{text-align:center;font-family:'Inter',system-ui}
td.sticky{position:sticky;z-index:2;background:var(--surface);box-shadow:2px 0 4px rgba(0,0,0,.05)}
tbody tr:hover td{background:#FAFAFA}
tbody tr:hover td.sticky{background:#FAFAFA}
tr:last-child td{border-bottom:none}
tfoot td{font-weight:700;background:var(--navy);color:#fff;border-top:2px solid var(--navy2);font-size:12px}
tfoot td.sticky{background:var(--navy);box-shadow:2px 0 4px rgba(0,0,0,.15)}
.city-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Inter',system-ui}
.plat-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Inter',system-ui}
.type-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;font-family:'Inter',system-ui}
.status-ongoing{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Inter',system-ui;background:#ECFDF5;color:#047857;border:1px solid #6EE7B7;white-space:nowrap}
.status-exp-ongoing{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Inter',system-ui;background:#FEF9C3;color:#854D0E;border:1px solid #FDE047;white-space:nowrap}
.status-exp-paused{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Inter',system-ui;background:#F1F5F9;color:#64748B;border:1px solid #CBD5E1;white-space:nowrap}

/* ── Campaign type comparison ── */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:740px){.type-grid{grid-template-columns:1fr}}
.type-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.type-hdr{padding:12px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.type-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.type-hdr-name{font-size:13px;font-weight:700}
.type-hdr-plat{font-size:10px;font-weight:600;margin-top:1px}
.type-body{padding:14px 16px}
.type-city-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--border)}
.type-city-row:last-child{margin-bottom:0}
.tcr-name{font-size:12px;font-weight:700;width:90px;flex-shrink:0}
.tcr-bar-wrap{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.tcr-bar{height:100%;border-radius:3px;transition:width .3s}
.tcr-vals{display:flex;gap:8px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);white-space:nowrap}
.tcr-val strong{color:var(--text);font-weight:700}
.empty{padding:36px;text-align:center;color:var(--text3);font-size:13px}
.pane{display:none}
.pane.active{display:block}
</style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="auth-gate" class="auth-gate">
  <div class="auth-card">
    <div class="auth-logo" id="auth-icon">🚗</div>
    <h2 id="auth-title">Used Cars Dashboard</h2>
    <p id="auth-desc">Sign in with your <strong>@girnarsoft.com</strong> Google account to access this dashboard.</p>
    <button id="auth-signin-btn" class="auth-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <p id="auth-error" class="auth-error" style="display:none"></p>
    <div id="auth-info-box" class="auth-info-box" style="display:none"></div>
  </div>
</div>

<button id="auth-signout-btn" class="auth-signout-top" type="button">Sign out</button>

<!-- ── ADMIN REQUESTS PANEL ── -->
<div id="req-panel" class="req-panel">
  <div class="req-panel-hdr" id="req-panel-hdr">
    <span class="req-panel-title">Access Manager <span class="req-badge" id="req-badge">0</span></span>
    <span id="req-chevron" style="font-size:16px">▲</span>
  </div>
  <div class="req-tabs" id="req-tabs" style="display:none">
    <button class="req-tab active" id="tab-pending-btn" onclick="switchReqTab('pending')">Pending</button>
    <button class="req-tab" id="tab-approved-btn" onclick="switchReqTab('approved')">Approved Users</button>
  </div>
  <div class="req-body" id="req-body">
    <div class="req-empty">No pending requests</div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard-app" style="display:none">
<div class="page">

<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m-4 12H9a2 2 0 01-2-2v-5a2 2 0 012-2h11a2 2 0 012 2v5a2 2 0 01-2 2h-2m-5-4l2 2 4-4"/></svg>
  </div>
  <div class="title-block">
    <h1>Used Cars — Performance Dashboard</h1>
    <p>Ahmedabad &nbsp;·&nbsp; Chandigarh &nbsp;·&nbsp; Nashik &nbsp;·&nbsp; Google + Meta</p>
  </div>
  <div class="period-badge" id="period-badge">Jul 1–15, 2026</div>
</div>

<!-- ── DATE FILTER ── -->
<div class="filter-bar">
  <label for="date-start">📅 Date Range</label>
  <input type="date" id="date-start" class="date-input" min="2026-04-06">
  <span class="filter-sep">→</span>
  <input type="date" id="date-end" class="date-input" min="2026-04-06">
  <span id="filter-active-badge" class="filter-active-badge" style="display:none">Filtered</span>
  <button class="filter-reset" id="filter-reset-btn" onclick="resetDateFilter()">Reset</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('overview')">Overview</button>
  <button class="tab" onclick="switchTab('city')">City Comparison</button>
  <button class="tab" onclick="switchTab('campaigns')">Campaign Detail</button>
  <button class="tab" onclick="switchTab('types')">Campaign Type Analysis</button>
  <button class="tab" onclick="switchTab('comparison')">Trend &amp; Comparison</button>
</div>

<div id="pane-overview" class="pane active"></div>
<div id="pane-city"     class="pane"></div>
<div id="pane-campaigns" class="pane"></div>
<div id="pane-types"   class="pane"></div>
<div id="pane-comparison" class="pane"></div>

</div><!-- /.page -->
</div><!-- /#dashboard-app -->

<!-- ── FIREBASE AUTH ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, onSnapshot, updateDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB_sUOU_qoMzTGIytUTHmZNI-MRlCYrC_4",
  authDomain: "used-cars-dashboard.firebaseapp.com",
  projectId: "used-cars-dashboard",
  storageBucket: "used-cars-dashboard.firebasestorage.app",
  messagingSenderId: "1059520845609",
  appId: "1:1059520845609:web:5bdcf638b4c555dc4c8938"
};

const ADMINS        = ["deepanshi.ahuja@girnarsoft.com", "neeraj.khichi@girnarsoft.com"];
const ALLOWED_DOMAIN = "girnarsoft.com";
// Uses the same Firestore collections as the main marketing dashboard (rules already allow access)
const COL_REQUESTS  = 'access_requests';
const COL_APPROVED  = 'approved_emails';

const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

const gate        = document.getElementById('auth-gate');
const dashboard   = document.getElementById('dashboard-app');
const signinBtn   = document.getElementById('auth-signin-btn');
const errorEl     = document.getElementById('auth-error');
const infoBox     = document.getElementById('auth-info-box');
const signoutBtn  = document.getElementById('auth-signout-btn');
const authIcon    = document.getElementById('auth-icon');
const authTitle   = document.getElementById('auth-title');
const authDesc    = document.getElementById('auth-desc');
const reqPanel    = document.getElementById('req-panel');
const reqBody     = document.getElementById('req-body');
const reqBadge    = document.getElementById('req-badge');
const reqPanelHdr = document.getElementById('req-panel-hdr');
const reqChevron  = document.getElementById('req-chevron');
const reqTabsEl   = document.getElementById('req-tabs');

let reqOpen    = true;
let reqUnsub   = null;
let pendingReqs = [];
let activeReqTab = 'pending';

// ── Panel collapse/expand ──
reqPanelHdr.addEventListener('click', () => {
  reqOpen = !reqOpen;
  reqBody.style.display    = reqOpen ? 'block' : 'none';
  reqTabsEl.style.display  = reqOpen ? 'flex'  : 'none';
  reqChevron.textContent   = reqOpen ? '▲' : '▼';
});

// ── Sign-in button ──
signinBtn.addEventListener('click', () => {
  errorEl.style.display = 'none';
  signinBtn.disabled = true;
  signinBtn.innerHTML = GOOGLE_SVG + ' Signing in…';
  signInWithPopup(auth, provider).catch(err => {
    let msg = 'Sign-in failed. Please try again.';
    if (err.code === 'auth/popup-blocked')    msg = 'Pop-up was blocked. Please allow pop-ups for this site.';
    if (err.code === 'auth/popup-closed-by-user') msg = 'Sign-in cancelled.';
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    signinBtn.disabled = false;
    signinBtn.innerHTML = GOOGLE_SVG + ' Sign in with Google';
  });
});

signoutBtn.addEventListener('click', () => signOut(auth));

// ── Auth screens ──
function showSignIn(msg) {
  gate.style.display  = 'flex';
  dashboard.style.display = 'none';
  authIcon.textContent = '🚗';
  authTitle.textContent = 'Used Cars Dashboard';
  authDesc.innerHTML = 'Sign in with your <strong>@girnarsoft.com</strong> Google account to access this dashboard.';
  signinBtn.style.display = 'flex';
  signinBtn.disabled = false;
  signinBtn.innerHTML = GOOGLE_SVG + ' Sign in with Google';
  errorEl.style.display = 'none';
  infoBox.style.display = 'none';
  signoutBtn.style.display = 'none';
  if (msg) { infoBox.innerHTML = msg; infoBox.style.display = 'block'; }
}

function showPending(user) {
  gate.style.display  = 'flex';
  dashboard.style.display = 'none';
  authIcon.textContent = '⏳';
  authTitle.textContent = 'Access Requested';
  authDesc.textContent = 'Your request has been sent to the admins for approval.';
  signinBtn.style.display = 'none';
  errorEl.style.display = 'none';
  infoBox.innerHTML = `Signed in as <strong>${user.email}</strong>.<br>You'll gain access once an admin approves your request.`;
  infoBox.style.display = 'block';
  signoutBtn.style.display = 'block';
}

function showRevoked(user) {
  gate.style.display  = 'flex';
  dashboard.style.display = 'none';
  authIcon.textContent = '🔒';
  authTitle.textContent = 'Access Revoked';
  authDesc.textContent = 'Your access to this dashboard has been removed by an admin.';
  signinBtn.style.display = 'none';
  errorEl.style.display = 'none';
  infoBox.innerHTML = `Signed in as <strong>${user.email}</strong>.<br>Contact an admin if you believe this is a mistake.`;
  infoBox.style.display = 'block';
  signoutBtn.style.display = 'block';
}

function showDenied(user) {
  gate.style.display  = 'flex';
  dashboard.style.display = 'none';
  authIcon.textContent = '🚫';
  authTitle.textContent = 'Access Denied';
  authDesc.textContent = 'Your access request was not approved.';
  signinBtn.style.display = 'none';
  errorEl.style.display = 'none';
  infoBox.innerHTML = `Signed in as <strong>${user.email}</strong>.<br>Contact an admin if you believe this is a mistake.`;
  infoBox.style.display = 'block';
  signoutBtn.style.display = 'block';
}

// ── Admin panel tab switch ──
window.switchReqTab = (tab) => {
  activeReqTab = tab;
  document.getElementById('tab-pending-btn').classList.toggle('active', tab === 'pending');
  document.getElementById('tab-approved-btn').classList.toggle('active', tab === 'approved');
  if (tab === 'pending') renderPendingTab();
  else renderApprovedTab();
};

function renderPendingTab() {
  if (!pendingReqs.length) {
    reqBody.innerHTML = '<div class="req-empty">No pending requests</div>';
    return;
  }
  reqBody.innerHTML = pendingReqs.map((r, i) => {
    const time = r.requestedAt ? new Date(r.requestedAt.seconds * 1000).toLocaleString('en-IN') : '';
    return `<div class="req-item" data-idx="${i}">
      <img class="req-avatar" src="${r.photoURL || ''}" onerror="this.style.display='none'" alt="">
      <div class="req-info">
        <div class="req-name">${r.name || 'Unknown'}</div>
        <div class="req-email" title="${r.email}">${r.email}</div>
        <div class="req-time">${time}</div>
      </div>
      <div class="req-actions">
        <button class="btn-approve" onclick="approveReq(${i})">Approve</button>
        <button class="btn-reject"  onclick="rejectReq(${i})">Reject</button>
      </div>
    </div>`;
  }).join('');
}

async function renderApprovedTab() {
  reqBody.innerHTML = '<div class="req-empty">Loading…</div>';
  try {
    const snap = await getDocs(collection(db, COL_APPROVED));
    const users = [];
    snap.forEach(d => users.push({ id: d.id, ...d.data() }));
    users.sort((a, b) => (a.email || '').localeCompare(b.email || ''));
    if (!users.length) {
      reqBody.innerHTML = '<div class="req-empty">No approved users yet</div>';
      return;
    }
    reqBody.innerHTML = users.map((u, i) => {
      const time = u.approvedAt ? new Date(u.approvedAt.seconds * 1000).toLocaleDateString('en-IN') : '';
      return `<div class="req-item" data-approved-idx="${i}">
        <div class="req-info">
          <div class="req-name">${u.email}</div>
          <div class="req-time">Approved ${time}${u.approvedBy ? ' by ' + u.approvedBy : ''}</div>
        </div>
        <div class="req-actions">
          <button class="btn-revoke" onclick="revokeAccess('${u.email}', '${u.id}')">Revoke</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    reqBody.innerHTML = '<div class="req-empty">Error loading users</div>';
  }
}

// ── Admin listener (pending requests real-time) ──
function startAdminListener() {
  if (reqUnsub) return;
  const q = query(collection(db, COL_REQUESTS), where('status', '==', 'pending'));
  reqUnsub = onSnapshot(q, snap => {
    pendingReqs = [];
    snap.forEach(d => pendingReqs.push({ id: d.id, ...d.data() }));
    pendingReqs.sort((a, b) => (a.requestedAt?.seconds || 0) - (b.requestedAt?.seconds || 0));
    reqBadge.textContent = pendingReqs.length;
    reqBadge.style.display = pendingReqs.length ? 'inline' : 'none';
    reqPanel.style.display = 'block';
    reqTabsEl.style.display = reqOpen ? 'flex' : 'none';
    if (activeReqTab === 'pending') renderPendingTab();
  }, err => {
    console.error('Firestore listener error:', err);
  });
}

// ── Approve ──
window.approveReq = async (idx) => {
  const r = pendingReqs[idx];
  if (!r) return;
  const item = document.querySelector(`.req-item[data-idx="${idx}"]`);
  if (item) item.querySelectorAll('button').forEach(b => { b.disabled = true; b.textContent = '…'; });
  try {
    await setDoc(doc(db, COL_APPROVED, r.id), {
      email: r.email, approvedAt: serverTimestamp(), approvedBy: auth.currentUser?.email || ''
    });
    await updateDoc(doc(db, COL_REQUESTS, r.id), { status: 'approved' });
  } catch(e) {
    if (item) item.querySelectorAll('button').forEach(b => { b.disabled = false; });
    alert('Error approving: ' + e.message);
  }
};

// ── Reject ──
window.rejectReq = async (idx) => {
  const r = pendingReqs[idx];
  if (!r) return;
  const item = document.querySelector(`.req-item[data-idx="${idx}"]`);
  if (item) item.querySelectorAll('button').forEach(b => { b.disabled = true; b.textContent = '…'; });
  try {
    await updateDoc(doc(db, COL_REQUESTS, r.id), { status: 'rejected' });
  } catch(e) {
    if (item) item.querySelectorAll('button').forEach(b => { b.disabled = false; });
    alert('Error rejecting: ' + e.message);
  }
};

// ── Revoke access ──
window.revokeAccess = async (email, docId) => {
  if (!confirm(`Revoke access for ${email}?`)) return;
  const btn = event.target;
  btn.disabled = true; btn.textContent = '…';
  try {
    // Remove from approved list
    await deleteDoc(doc(db, COL_APPROVED, docId));
    // Mark their request as revoked so they see the right screen on next visit
    await setDoc(doc(db, COL_REQUESTS, docId), {
      email, status: 'revoked', revokedAt: serverTimestamp(), revokedBy: auth.currentUser?.email || ''
    }, { merge: true });
    // Refresh the approved tab
    renderApprovedTab();
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Revoke';
    alert('Error revoking: ' + e.message);
  }
};

// ── Auth state ──
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    if (reqUnsub) { reqUnsub(); reqUnsub = null; }
    reqPanel.style.display = 'none';
    showSignIn();
    return;
  }

  const email  = (user.email || '').toLowerCase();
  const domain = email.split('@')[1] || '';

  // Hard block for non-girnarsoft accounts
  if (domain !== ALLOWED_DOMAIN) {
    gate.style.display  = 'flex';
    dashboard.style.display = 'none';
    authIcon.textContent = '🔒';
    authTitle.textContent = 'Access Restricted';
    authDesc.innerHTML = 'This dashboard is only accessible to <strong>@girnarsoft.com</strong> accounts.';
    signinBtn.style.display = 'none';
    infoBox.innerHTML = `You signed in as <strong>${user.email}</strong>.<br>Only @girnarsoft.com accounts can request access.`;
    infoBox.style.display = 'block';
    errorEl.style.display = 'none';
    signoutBtn.style.display = 'block';
    return;
  }

  // Admins bypass all checks
  if (ADMINS.includes(email)) {
    gate.style.display  = 'none';
    dashboard.style.display = 'block';
    signoutBtn.style.display = 'block';
    startAdminListener();
    initDashboard();
    return;
  }

  try {
    // Check if already approved
    const approvedSnap = await getDoc(doc(db, COL_APPROVED, email));
    if (approvedSnap.exists()) {
      gate.style.display  = 'none';
      dashboard.style.display = 'block';
      signoutBtn.style.display = 'block';
      initDashboard();
      return;
    }

    // Check existing request status
    const reqSnap = await getDoc(doc(db, COL_REQUESTS, email));
    if (reqSnap.exists()) {
      const status = reqSnap.data().status;
      if (status === 'rejected') { showDenied(user); return; }
      if (status === 'revoked')  { showRevoked(user); return; }
      if (status === 'pending')  { showPending(user); return; }
    }

    // Submit fresh access request
    await setDoc(doc(db, COL_REQUESTS, email), {
      email: user.email,
      name: user.displayName || '',
      photoURL: user.photoURL || '',
      requestedAt: serverTimestamp(),
      status: 'pending'
    }, { merge: true });
    showPending(user);

  } catch(e) {
    // Show the error so the user knows what happened
    gate.style.display  = 'flex';
    dashboard.style.display = 'none';
    authIcon.textContent = '⚠️';
    authTitle.textContent = 'Something went wrong';
    authDesc.textContent = 'There was a problem submitting your access request.';
    errorEl.textContent = 'Error: ' + e.message;
    errorEl.style.display = 'block';
    signinBtn.style.display = 'none';
    signoutBtn.style.display = 'block';
  }
});
</script>

var CITY_COLOR  = {Ahmedabad:'#7C3AED', Chandigarh:'#0369A1', Nashik:'#047857'};
var CITY_LIGHT  = {Ahmedabad:'#F5F3FF', Chandigarh:'#EFF6FF', Nashik:'#ECFDF5'};

var PLAT_LIGHT  = {Google:'#FEF2F2', Meta:'#EFF6FF'};

var TYPE_LIGHT  = {Search:'#F5F3FF', Catalogue:'#FFFBEB', LeadForm:'#ECFEFF', 'Demand Gen':'#ECFDF5', 'Performance Max':'#FAF5FF', 'Website Conversion':'#EFF6FF', WhatsApp:'#F0FDF4', Other:'#F8FAFC'};

var _today = new Date();
var _pad = function(n){return n<10?'0'+n:String(n);};
var TODAY_STR = _today.getFullYear()+'-'+_pad(_today.getMonth()+1)+'-'+_pad(_today.getDate());
var DEFAULT_START = TODAY_STR.substring(0,7)+'-01'; // first of current month
var DEFAULT_END   = TODAY_STR;

// ── DATE FILTER ──────────────────────────────────────────────────────────────
function applyDateFilter() {
  var s = document.getElementById('date-start').value;
  var e = document.getElementById('date-end').value;
  if (!s || !e || s > e) return;

  // Aggregate spend from DATA_DAILY for the selected date range
  var campAgg = {};
  DATA_DAILY.forEach(function(d) {
    if (d.Date >= s && d.Date <= e) {
      if (!campAgg[d.Campaign]) campAgg[d.Campaign] = {Spends:0, Impressions:0, Clicks:0, Conversions:0};
      campAgg[d.Campaign].Spends      += d.Spends;
      campAgg[d.Campaign].Impressions += d.Impressions;
      campAgg[d.Campaign].Clicks      += d.Clicks;
      campAgg[d.Campaign].Conversions += d.Conversions;
    }
  });

  // Aggregate triggers from DATA_TRIGGERS for the selected range
  var campTrigAgg = {};
  DATA_TRIGGERS.forEach(function(d) {
    if (d.Date >= s && d.Date <= e) {
      if (!campTrigAgg[d.Campaign]) campTrigAgg[d.Campaign] = {Triggered_Leads:0, Dealer_Triggers:0};
      campTrigAgg[d.Campaign].Triggered_Leads += d.Triggered_Leads;
      campTrigAgg[d.Campaign].Dealer_Triggers += d.Dealer_Triggers;
    }
  });

  // If no daily data yet (DATA_DAILY empty), fall back to campaign-overlap filter on DATA_RAW totals
  if (DATA_DAILY.length === 0) {
    DATA = DATA_RAW.filter(function(r) {
      var cs = r.StartDate || '2026-04-06';
      var ce = r.EndDate   || TODAY_STR;
      return cs <= e && ce >= s;
    });
  } else {
    // Build DATA: merge daily-aggregated spend + triggers with campaign metadata
    DATA = DATA_RAW
      .filter(function(r) { return campAgg[r.Campaign]; })
      .map(function(r) {
        var a = campAgg[r.Campaign];
        var trig = campTrigAgg[r.Campaign];
        // WhatsApp: keep manually-set value; others: use date-filtered totals (0 if no rows match)
        var gl = (r.Type === 'WhatsApp') ? r.Triggered_Leads
               : DATA_TRIGGERS.length ? (trig ? trig.Triggered_Leads : 0) : r.Triggered_Leads;
        var dt = (r.Type === 'WhatsApp') ? r.Dealer_Triggers
               : DATA_TRIGGERS.length ? (trig ? trig.Dealer_Triggers : 0) : r.Dealer_Triggers;
        return {
          Campaign:        r.Campaign,
          Platform:        r.Platform,
          City:            r.City,
          Type:            r.Type,
          Status:          r.Status,
          StartDate:       r.StartDate,
          EndDate:         r.EndDate,
          Triggered_Leads: gl,
          Dealer_Triggers: dt,
          Spends:          Math.round(a.Spends * 100) / 100,
          Impressions:     Math.round(a.Impressions),
          Clicks:          Math.round(a.Clicks),
          Conversions:     Math.round(a.Conversions * 100) / 100
        };
      });
  }

  var badge = document.getElementById('filter-active-badge');
  var periodBadge = document.getElementById('period-badge');
  var isDefault = (s === DEFAULT_START && e === DEFAULT_END);
  badge.style.display = isDefault ? 'none' : 'inline-block';
  periodBadge.textContent = formatDateRange(s, e);

  // Invalidate rendered panes so they re-render
  ['overview','city','campaigns','types','comparison'].forEach(function(id) {
    var el = document.getElementById('pane-' + id);
    if (el) { el.dataset.done = ''; el.innerHTML = ''; }
  });

  // Re-render active pane
  var activeTab = document.querySelector('.tab.active');
  if (activeTab) {
    var ids = ['overview','city','campaigns','types','comparison'];
    document.querySelectorAll('.tab').forEach(function(t, i) {
      if (t.classList.contains('active')) switchTab(ids[i]);
    });
  } else {
    renderOverview();
  }
}

function resetDateFilter() {
  document.getElementById('date-start').value = DEFAULT_START;
  document.getElementById('date-end').value   = DEFAULT_END;
  applyDateFilter();
}

function formatDateRange(s, e) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmt(d) {
    var p = d.split('-');
    return p[2].replace(/^0/,'') + ' ' + months[parseInt(p[1],10)-1] + ' ' + p[0];
  }
  return fmt(s) + ' – ' + fmt(e);
}

// Set date inputs and run initial filter to populate DATA
(function() {
  var s = document.getElementById('date-start');
  var e = document.getElementById('date-end');
  s.value = DEFAULT_START; s.max = TODAY_STR;
  e.value = DEFAULT_END;   e.max = TODAY_STR;
  applyDateFilter();
})();
document.getElementById('date-start').addEventListener('change', applyDateFilter);
document.getElementById('date-end').addEventListener('change', applyDateFilter);

// ── HELPERS ──────────────────────────────────────────────────────────────────
function INR(v)  { return '₹'+Number(v).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function NUM(v)  { return Number(v).toLocaleString('en-IN'); }
function PCT(v)  { return (v*100).toFixed(1)+'%'; }
function agg(rows) {
  return rows.reduce(function(a,r) {
    a.sp+=r.Spends; a.imp+=r.Impressions; a.cl+=r.Clicks;
    a.cv+=r.Conversions; a.gl+=r.Triggered_Leads; a.dt+=r.Dealer_Triggers;
    return a;
  },{sp:0,imp:0,cl:0,cv:0,gl:0,dt:0});
}
function cpl(sp,gl)   { return gl>0?sp/gl:null; }
function cpm(sp,imp)  { return imp>0?sp/imp*1000:null; }
function ctr(cl,imp)  { return imp>0?cl/imp:null; }
function fmt(v,dec)   { return v==null?'—':'₹'+v.toFixed(dec||0).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtN(v)      { return v==null?'—':v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

function cityBadge(city) {
  return '<span class="city-badge" style="background:'+CITY_LIGHT[city]+';color:'+CITY_COLOR[city]+';border:1px solid '+CITY_BORDER[city]+'">'+city+'</span>';
}
function platBadge(p) {
  return '<span class="plat-badge" style="background:'+PLAT_LIGHT[p]+';color:'+PLAT_COLOR[p]+';border:1px solid '+PLAT_BDR[p]+'">'+p+'</span>';
}
function statusBadge(s) {
  if(!s) return '';
  if(s==='Ongoing') return '<span class="status-ongoing"><span style="width:5px;height:5px;border-radius:50%;background:#047857;display:inline-block"></span>Ongoing</span>';
  if(s==='Experiment · Ongoing') return '<span class="status-exp-ongoing"><span style="width:5px;height:5px;border-radius:50%;background:#CA8A04;display:inline-block"></span>Exp · Active</span>';
  if(s==='Experiment · Paused')  return '<span class="status-exp-paused"><span style="width:5px;height:5px;border-radius:50%;background:#94A3B8;display:inline-block"></span>Exp · Paused</span>';
  return '<span class="status-exp-paused">'+s+'</span>';
}
function typeBadge(t) {

}

function noDataMsg() {

}

function updateWaDt(input, campaign) {

// ── TAB SWITCH ───────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(function(t,i) {
    var ids=['overview','city','campaigns','types','comparison'];
    t.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.pane').forEach(function(p) { p.classList.remove('active'); });

  if(id==='overview')   renderOverview();
  if(id==='city')       renderCity();
  if(id==='campaigns')  renderCampaigns();

  if(id==='comparison') renderComparison();
}

// ── TREND & COMPARISON ────────────────────────────────────────────────────────
function renderComparison() {
  var el = document.getElementById('pane-comparison');
  if (!el) return;

  var s = document.getElementById('date-start').value;
  var e = document.getElementById('date-end').value;
  if (!s || !e) { el.innerHTML = noDataMsg(); return; }

  var period  = (document.getElementById('comp-period')||{value:'daily'}).value||'daily';
  var selType = (document.getElementById('comp-type')||{value:'All'}).value||'All';
  var selKpi  = (document.getElementById('comp-kpi')||{value:'sp'}).value||'sp';

  var KPI_OPTS=[
    {k:'sp',   label:'Spends'},
    {k:'gl',   label:'Triggered Leads'},
    {k:'dt',   label:'Dealer Triggers'},
    {k:'cv',   label:'Panel Conversions'},
    {k:'cpl',  label:'CPL (₹)'},
    {k:'tcpl', label:'TCPL (₹)'},
    {k:'dcpl', label:'Dealer CPL (₹)'}
  ];
  function kpiVal(r,k){
    if(!r) return null;
    if(k==='sp')   return r.sp;
    if(k==='gl')   return r.gl;
    if(k==='dt')   return r.dt;
    if(k==='cv')   return r.cv;
    if(k==='cpl')  return r.cv?r.sp/r.cv:null;
    if(k==='tcpl') return r.gl?r.sp/r.gl:null;
    if(k==='dcpl') return r.dt?r.sp/r.dt:null;
    return null;
  }
  function kpiFmt(v,k){
    if(v==null) return '—';
    if(k==='sp'||k==='cpl'||k==='tcpl'||k==='dcpl') return INR(Math.round(v));
    return NUM(Math.round(v));
  }

  // All campaign types from DATA_RAW
  var allTypes = ['All'];
  var _ts = {};
  DATA_RAW.forEach(function(r){ if(r.Type&&!_ts[r.Type]){_ts[r.Type]=1;allTypes.push(r.Type);} });

  // Build city → campaign set (filtered by type)
  var CITIES = ['Ahmedabad','Chandigarh','Nashik'];
  var cityCamps = {}; CITIES.forEach(function(c){cityCamps[c]={};});
  DATA_RAW.forEach(function(r){
    if (selType!=='All' && r.Type!==selType) return;
    if (cityCamps[r.City]) cityCamps[r.City][r.Campaign]=1;
  });

  // Bucket helpers
  function getBucket(date) {
    if (period==='weekly') {
      var d=new Date(date+'T00:00:00'); var day=d.getDay();
      d.setDate(d.getDate()-day+(day===0?-6:1));
      var mm=d.getMonth()+1,dd=d.getDate();
      return d.getFullYear()+'-'+(mm<10?'0'+mm:mm)+'-'+(dd<10?'0'+dd:dd);
    }
    if (period==='monthly') return date.substring(0,7);
    return date;
  }
  function bucketLabel(b) {
    var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (period==='monthly'){var p=b.split('-');return M[+p[1]-1]+' '+p[0];}
    var p=b.split('-'); var lbl=p[2].replace(/^0/,'')+' '+M[+p[1]-1];
    return period==='weekly'?'Wk '+lbl:lbl;
  }

  // Aggregate per city per bucket
  var cityMaps={}; CITIES.forEach(function(c){cityMaps[c]={};});
  function ensureBucket(map,b){if(!map[b])map[b]={sp:0,imp:0,cl:0,cv:0,gl:0,dt:0};}

  DATA_DAILY.forEach(function(d){
    if(d.Date<s||d.Date>e) return;
    var b=getBucket(d.Date);
    CITIES.forEach(function(c){ if(cityCamps[c][d.Campaign]){ensureBucket(cityMaps[c],b); var r=cityMaps[c][b]; r.sp+=d.Spends;r.imp+=d.Impressions;r.cl+=d.Clicks;r.cv+=d.Conversions;} });
  });
  DATA_TRIGGERS.forEach(function(d){
    if(d.Date<s||d.Date>e) return;
    var b=getBucket(d.Date);
    CITIES.forEach(function(c){ if(cityCamps[c][d.Campaign]){ensureBucket(cityMaps[c],b); var r=cityMaps[c][b]; r.gl+=d.Triggered_Leads;r.dt+=d.Dealer_Triggers;} });
  });

  // Union of all buckets
  var bucketSet={}; CITIES.forEach(function(c){Object.keys(cityMaps[c]).forEach(function(b){bucketSet[b]=1;});});
  var buckets=Object.keys(bucketSet).sort();
  var labels=buckets.map(bucketLabel);

  if(!buckets.length){el.innerHTML=noDataMsg();return;}

  var CC={Ahmedabad:'#7C3AED',Chandigarh:'#0369A1',Nashik:'#047857'};

  // Ensure HTML tooltip div exists once in DOM
  if(!document.getElementById('ctip')){
    var _td=document.createElement('div'); _td.id='ctip';
    _td.style.cssText='position:fixed;display:none;background:#1D2939;color:#fff;border-radius:10px;padding:12px 16px;font-size:12px;font-family:Inter,system-ui,sans-serif;z-index:9999;pointer-events:none;min-width:190px;box-shadow:0 6px 24px rgba(0,0,0,0.28);line-height:1.75;border:1px solid rgba(255,255,255,0.07)';
    document.body.appendChild(_td);
  }

  function svgCityChart(map, color, city) {
    var vals=buckets.map(function(b){ return kpiVal(map[b],selKpi); });
    var valid=vals.filter(function(v){return v!=null&&v>=0;});
    var maxV=valid.length?Math.max.apply(null,valid):1; if(maxV===0)maxV=1;
    var W=880,H=230,pL=72,pR=20,pT=18,pB=44;
    var cW=W-pL-pR,cH=H-pT-pB,n=buckets.length;
    function xp(i){return Math.round(pL+(n<=1?cW/2:i*cW/(n-1)));}
    function yp(v){return v==null?pT+cH:Math.round(pT+cH-(v/maxV)*cH);}
    var uid='cc'+Math.floor(Math.random()*1e9);

    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;overflow:visible" id="'+uid+'">';
    // Gradient
    svg+='<defs><linearGradient id="gr'+uid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.18"/><stop offset="85%" stop-color="'+color+'" stop-opacity="0.02"/></linearGradient></defs>';

    // Horizontal grid lines
    for(var g=0;g<=4;g++){
      var gv=maxV*g/4,gy=yp(gv);
      svg+='<line x1="'+pL+'" y1="'+gy+'" x2="'+(W-pR)+'" y2="'+gy+'" stroke="'+(g===0?'#E4E7EC':'#F2F4F7')+'" stroke-width="'+(g===0?1:1)+'"/>';
      if(g>0){
        var lbl=gv>=1e5?(gv/1e5).toFixed(1)+'L':gv>=1e3?(gv/1e3).toFixed(1)+'K':Math.round(gv)+'';
        svg+='<text x="'+(pL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="#98A2B3" font-family="Inter,system-ui,sans-serif">'+lbl+'</text>';
      }
    }

    // X-axis labels (max 10 visible)
    var step=Math.max(1,Math.ceil(n/10));
    for(var i=0;i<n;i++){
      if(i%step!==0&&i!==n-1) continue;
      svg+='<text x="'+xp(i)+'" y="'+(H-pB+16)+'" text-anchor="middle" font-size="10" fill="#98A2B3" font-family="Inter,system-ui,sans-serif">'+labels[i]+'</text>';
    }

    // Build valid point list
    var pts=[]; for(var i=0;i<n;i++){ var v=vals[i]; if(v!=null&&v>=0) pts.push({i:i,x:xp(i),y:yp(v),v:v}); }

    if(pts.length>1){
      // Area fill
      var ap='M '+pts[0].x+','+(pT+cH); pts.forEach(function(p){ap+=' L '+p.x+','+p.y;}); ap+=' L '+pts[pts.length-1].x+','+(pT+cH)+' Z';
      svg+='<path d="'+ap+'" fill="url(#gr'+uid+')" />';
      // Line
      var lp='M '+pts[0].x+','+pts[0].y; pts.forEach(function(p,j){if(j>0)lp+=' L '+p.x+','+p.y;});
      svg+='<path d="'+lp+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    }

    // Dots + invisible hover columns
    for(var i=0;i<n;i++){
      var v=vals[i],cx=xp(i);
      var r=map[buckets[i]]||{sp:0,cv:0,gl:0,dt:0};
      // Tooltip data
      var td=JSON.stringify({
        d:labels[i],c:city,
        sp:Math.round(r.sp),cv:fmtN(r.cv),
        gl:Math.round(r.gl),dt:Math.round(r.dt),
        cpl:r.cv?Math.round(r.sp/r.cv):0,
        tcpl:r.gl?Math.round(r.sp/r.gl):0,
        dcpl:r.dt?Math.round(r.sp/r.dt):0
      }).replace(/"/g,'&quot;');
      var x0=i===0?pL:Math.round((xp(Math.max(0,i-1))+cx)/2);
      var x1=i===n-1?W-pR:Math.round((cx+xp(Math.min(n-1,i+1)))/2);
      svg+='<rect x="'+x0+'" y="'+pT+'" width="'+(x1-x0)+'" height="'+cH+'" fill="transparent" style="cursor:crosshair"'
          +' data-tip="'+td+'"'
          +' onmouseenter="showCTip(event,this)" onmouseleave="hideCTip()" />';
      if(v!=null&&v>=0)
        svg+='<circle cx="'+cx+'" cy="'+yp(v)+'" r="4" fill="'+color+'" stroke="#fff" stroke-width="2.5" style="pointer-events:none"/>';
    }
    svg+='</svg>';
    return svg;
  }

  // ── HTML ──
  var html='';

  // Filter bar
  html+='<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:#fff;padding:14px 20px;border-radius:14px;border:1px solid var(--border);margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.04)">';

  // Period
  html+='<div style="display:flex;align-items:center;gap:6px">';
  html+='<span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Period</span>';
  ['daily','weekly','monthly'].forEach(function(p){
    var a=p===period;
    html+='<button onclick="setCompPeriod(\''+p+'\')" style="padding:5px 13px;font-size:12px;font-family:inherit;font-weight:'+(a?600:400)+';border-radius:7px;border:1px solid '+(a?'var(--navy)':'var(--border2)')+';background:'+(a?'var(--navy)':'transparent')+';color:'+(a?'#fff':'var(--text2)')+';cursor:pointer;transition:all .15s">'+(p.charAt(0).toUpperCase()+p.slice(1))+'</button>';
  });
  html+='</div>';

  html+='<div style="width:1px;height:26px;background:var(--border);flex-shrink:0"></div>';

  // Campaign type dropdown
  html+='<div style="display:flex;align-items:center;gap:7px">';
  html+='<span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap">Type</span>';
  html+='<select onchange="setCompType(encodeURIComponent(this.value))" style="font-size:12px;font-family:inherit;padding:6px 10px;border-radius:8px;border:1px solid var(--border2);background:#fff;color:var(--text);cursor:pointer;min-width:150px;outline:none">';
  allTypes.forEach(function(t){ html+='<option value="'+t+'"'+(t===selType?' selected':'')+'>'+t+'</option>'; });
  html+='</select></div>';

  html+='<div style="width:1px;height:26px;background:var(--border);flex-shrink:0"></div>';

  // KPI dropdown
  html+='<div style="display:flex;align-items:center;gap:7px">';
  html+='<span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap">KPI</span>';
  html+='<select onchange="setCompKpi(this.value)" style="font-size:12px;font-family:inherit;padding:6px 10px;border-radius:8px;border:1px solid var(--border2);background:#fff;color:var(--text);cursor:pointer;min-width:170px;outline:none">';
  KPI_OPTS.forEach(function(opt){ html+='<option value="'+opt.k+'"'+(opt.k===selKpi?' selected':'')+'>'+opt.label+'</option>'; });
  html+='</select></div>';

  html+='<span style="margin-left:auto;font-size:11px;color:var(--text3)">'+labels.length+' '+period+(labels.length!==1?'s':'')+' · hover dots for details</span>';
  html+='</div>';

  // 3 city cards
  CITIES.forEach(function(city){
    var map=cityMaps[city], color=CC[city];
    var tot={sp:0,cv:0,gl:0,dt:0};
    buckets.forEach(function(b){var r=map[b];if(r){tot.sp+=r.sp;tot.cv+=r.cv;tot.gl+=r.gl;tot.dt+=r.dt;}});
    var hasData=tot.sp>0||tot.gl>0;

    html+='<div style="background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04)">';

// ── CHART TOOLTIP (HTML floating div) ────────────────────────────────────────
function showCTip(evt, rectEl) {
  var tip = document.getElementById('ctip');
  if (!tip) return;
  try {
    var d = JSON.parse(rectEl.getAttribute('data-tip'));
    var rows = [
      ['<span style="font-weight:700;font-size:13px">'+d.d+'</span><span style="opacity:.6;font-size:11px;margin-left:6px">'+d.c+'</span>',''],
      ['Spends', INR(d.sp)],
      ['Panel Conv.', d.cv],
      ['Trig. Leads', NUM(d.gl)],
      ['Dealer Trig.', NUM(d.dt)],
      ['CPL', d.cpl ? INR(d.cpl) : '—'],
      ['TCPL', d.tcpl ? INR(d.tcpl) : '—'],
      ['Dealer CPL', d.dcpl ? INR(d.dcpl) : '—']
    ];
    tip.innerHTML = rows.map(function(r,i){
      return i===0
        ? '<div style="padding-bottom:7px;margin-bottom:7px;border-bottom:1px solid rgba(255,255,255,0.12)">'+r[0]+'</div>'
        : '<div style="display:flex;justify-content:space-between;gap:20px"><span style="color:rgba(255,255,255,0.6)">'+r[0]+'</span><span style="font-weight:600">'+r[1]+'</span></div>';
    }).join('');
    var x = evt.clientX + 16, y = evt.clientY - 20;
    if (x + 210 > window.innerWidth) x = evt.clientX - 224;
    if (y + 180 > window.innerHeight) y = evt.clientY - 190;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
    tip.style.display = 'block';
  } catch(e) {}
}
function hideCTip() {
  var tip = document.getElementById('ctip');
  if (tip) tip.style.display = 'none';
}
window.showCTip = showCTip;
window.hideCTip = hideCTip;

  html+='<th class="left sticky" style="left:130px;min-width:100px">Platform</th>';

  ['Spends','Impressions','Clicks','CTR','Panel Conv.','Triggered Leads','Dealer Triggers','Trigger %','Panel CPL','TCPL','Dealer CPL'].forEach(function(k){html+='<th>'+k+'</th>';});
  html+='</tr></thead><tbody>';
  types.forEach(function(type) {
    var rows=DATA.filter(function(r){return r.Type===type;});
    var t=agg(rows); var tpct=t.gl>0?t.dt/t.gl:null;
    var plats=[...new Set(rows.map(function(r){return r.Platform;}))];
    var statuses=[...new Set(rows.map(function(r){return r.Status||'';}).filter(Boolean))];
    html+='<tr>';
    html+='<td class="left sticky" style="left:0;min-width:130px">'+typeBadge(type)+'</td>';
    html+='<td class="left sticky" style="left:130px;min-width:100px">'+plats.map(platBadge).join(' ')+'</td>';
    html+='<td class="left" style="min-width:110px">'+statuses.map(statusBadge).join(' ')+'</td>';
    html+='<td>'+INR(t.sp)+'</td><td>'+NUM(t.imp)+'</td><td>'+NUM(t.cl)+'</td>';
    html+='<td>'+PCT(ctr(t.cl,t.imp))+'</td><td>'+fmtN(t.cv)+'</td>';
    html+='<td>'+(t.gl>0?NUM(t.gl):'—')+'</td><td>'+NUM(t.dt)+'</td>';
    html+='<td>'+(tpct!=null?PCT(tpct):'—')+'</td>';
    html+='<td>'+fmt(cpl(t.sp,t.cv),0)+'</td>';
    html+='<td>'+(t.gl>0?fmt(cpl(t.sp,t.gl),0):'—')+'</td>';
    html+='<td>'+fmt(cpl(t.sp,t.dt),0)+'</td></tr>';
  });
  var tt=agg(DATA); var ttpct2=tt.gl>0?tt.dt/tt.gl:null;
  html+='</tbody><tfoot><tr><td class="left sticky" style="left:0" colspan="2">TOTAL</td><td></td>';
  html+='<td>'+INR(tt.sp)+'</td><td>'+NUM(tt.imp)+'</td><td>'+NUM(tt.cl)+'</td>';
  html+='<td>'+PCT(ctr(tt.cl,tt.imp))+'</td><td>'+fmtN(tt.cv)+'</td>';
  html+='<td>'+NUM(tt.gl)+'</td><td>'+NUM(tt.dt)+'</td>';
  html+='<td>'+(ttpct2!=null?PCT(ttpct2):'—')+'</td>';
  html+='<td>'+fmt(cpl(tt.sp,tt.cv),0)+'</td><td>'+fmt(cpl(tt.sp,tt.gl),0)+'</td><td>'+fmt(cpl(tt.sp,tt.dt),0)+'</td>';
  html+='</tr></tfoot></table></div></div>';

  html+='<div style="margin-top:20px;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px">City comparison within each campaign type</div>';
  html+='<div class="type-grid">';
  types.forEach(function(type) {
    var typeRows=DATA.filter(function(r){return r.Type===type;});
    var cityTots={}; cities.forEach(function(city){ var cr=typeRows.filter(function(r){return r.City===city;}); cityTots[city]=agg(cr); });
    var plats=[...new Set(typeRows.map(function(r){return r.Platform;}))];
    var maxSp=Math.max.apply(null, cities.map(function(c){return cityTots[c].sp;}));
    html+='<div class="type-card"><div class="type-hdr"><div class="type-icon" style="background:'+TYPE_LIGHT[type]+'">';
    html+=type==='Search'?'🔍':type==='Catalogue'?'📋':type==='LeadForm'?'📝':type==='Demand Gen'?'📣':type==='Performance Max'?'⚡':type==='Website Conversion'?'🌐':'💬';
    html+='</div><div><div class="type-hdr-name">'+type+'</div>';
    html+='<div class="type-hdr-plat" style="color:var(--text2)">'+plats.map(function(p){return '<span style="color:'+PLAT_COLOR[p]+'">'+p+'</span>';}).join(' · ')+'</div></div></div>';
    html+='<div class="type-body">';
    cities.forEach(function(city) {
      var t=cityTots[city]; if(!t.sp&&!t.gl&&!t.cv) return;
      var pct=maxSp>0?t.sp/maxSp*100:0; var cc=CITY_COLOR[city];
      html+='<div class="type-city-row" style="border-color:'+CITY_BORDER[city]+';background:'+CITY_LIGHT[city]+'10">';
      html+='<div class="tcr-name" style="color:'+cc+'">'+city+'</div>';
      html+='<div class="tcr-bar-wrap"><div class="tcr-bar" style="width:'+pct+'%;background:'+cc+'"></div></div>';
      html+='<div class="tcr-vals"><span>Sp: <strong>'+INR(t.sp)+'</strong></span>';
      if(t.gl>0) html+='<span>GL: <strong>'+t.gl+'</strong></span>';
      if(t.cv>0) html+='<span>Conv: <strong>'+fmtN(t.cv)+'</strong></span>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  html+='<div class="tbl-card" style="margin-top:16px"><div class="tbl-toolbar"><span class="tbl-title">CPL by Type × City</span><span class="tbl-sub">Spends ÷ Gen Leads (— where no leads)</span></div>';
  html+='<div class="tbl-wrap"><table><thead><tr><th class="left">Campaign Type</th>';
  cities.forEach(function(c){html+='<th>'+c+'</th>';});
  html+='<th>Combined</th></tr></thead><tbody>';
  types.forEach(function(type) {
    html+='<tr><td class="left">'+typeBadge(type)+'</td>';
    var allRows=DATA.filter(function(r){return r.Type===type;}); var tot2=agg(allRows);
    cities.forEach(function(city) {
      var cr=DATA.filter(function(r){return r.Type===type&&r.City===city;}); var t=agg(cr);
      html+='<td>'+fmt(cpl(t.sp,t.gl),0)+'</td>';
    });
    html+='<td style="font-weight:700">'+fmt(cpl(tot2.sp,tot2.gl),0)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  el.innerHTML=html;
}

function initDashboard() {
  if(document.getElementById('pane-overview').dataset.done) return;
  renderOverview();
}
window.initDashboard = initDashboard;
window.resetDateFilter = resetDateFilter;
</script>
